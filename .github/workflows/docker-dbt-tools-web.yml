# Builds packages/dbt-tools/web/Dockerfile (context: repo root) and pushes to GHCR.
# If harden-runner egress-policy becomes "block", allowlist docker.io, ghcr.io, and
# registry endpoints required by build-push-action / BuildKit.

name: Docker @dbt-tools/web (GHCR)

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

concurrency:
  group: docker-web-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: read-all

jobs:
  image:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: step-security/harden-runner@6c439dc8bdf85cadbbce9ed30d1c7b959517bc49 # v2.10.3
        with:
          egress-policy: audit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container image name (GHCR requires lowercase)
        id: image
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          owner_lc=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner_lc}/dbt-tools-web" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/dbt-tools/web/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
