# Publishes dbt-artifacts-parser (Apache-2.0). Monorepo licensing: see README.md and LICENSES/README.md.

name: Publish dbt-artifacts-parser

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-dbt-artifacts-parser
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          # scope: "@yu-iskw"
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 11
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
      - name: Build package
        run: |
          pnpm --filter ./packages/dbt-artifacts-parser build
      - name: Run tests
        run: |
          pnpm --filter ./packages/dbt-artifacts-parser test
      - name: Require npm CLI for OIDC trusted publishing
        run: |
          set -euo pipefail
          v=$(npm --version)
          echo "npm version: ${v}"
          IFS='.-' read -r major minor patch _ <<<"${v}"
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}
          if [ "${major}" -lt 11 ] \
            || { [ "${major}" -eq 11 ] && [ "${minor}" -lt 5 ]; } \
            || { [ "${major}" -eq 11 ] && [ "${minor}" -eq 5 ] && [ "${patch}" -lt 1 ]; }; then
            echo "::error::npm must be >= 11.5.1 for trusted publishing (https://docs.npmjs.com/trusted-publishers)"
            exit 1
          fi
      - name: Publish to npm
        run: |
          pnpm publish --filter ./packages/dbt-artifacts-parser --no-git-checks --access public
