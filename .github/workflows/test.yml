name: Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: read-all

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read # For repo checkout

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build dependencies
        run: pnpm build
      - name: Run tests with coverage
        run: pnpm test:coverage && pnpm coverage:report

  web-pack-npx-smoke:
    name: Web pack + npx smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verdaccio publish peers + pack + npx smoke
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: bash scripts/smoke-npx-with-verdaccio.sh

  e2e:
    name: E2E ${{ matrix.shard }}/2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright Chromium
        run: pnpm --filter @dbt-tools/web exec playwright install chromium --with-deps
      - name: Build (vite preview needs dist)
        run: pnpm build
      - name: Run Playwright (shard)
        run: pnpm --filter @dbt-tools/web exec playwright test --shard=${{ matrix.shard }}/2
