<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        padding: 40px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }
      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e5e5;
      }
      .header h2 {
        font-size: 16px;
        color: #333;
        font-weight: 600;
      }
      .header p {
        font-size: 13px;
        color: #666;
        margin-top: 4px;
      }

      /* Compact Filter Bar */
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 24px;
        background: #fafafa;
        border-bottom: 1px solid #e5e5e5;
        flex-wrap: wrap;
      }

      .filter-group {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        background: white;
        border-radius: 20px;
        border: 1px solid #e0e0e0;
        font-size: 12px;
      }

      .filter-label {
        color: #666;
        font-weight: 500;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.5px;
      }

      .pill {
        padding: 4px 10px;
        border-radius: 12px;
        border: 1px solid #e0e0e0;
        background: white;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .pill.active {
        background: #10b981;
        color: white;
        border-color: #10b981;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .dot.success {
        background: #10b981;
      }

      .type-pill {
        border-left: 3px solid #3b82f6;
        padding-left: 8px;
      }

      .segmented {
        display: flex;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid #e0e0e0;
      }

      .segmented button {
        padding: 4px 10px;
        border: none;
        background: white;
        font-size: 11px;
        cursor: pointer;
        border-right: 1px solid #e0e0e0;
      }

      .segmented button:last-child {
        border-right: none;
      }
      .segmented button.active {
        background: #3b82f6;
        color: white;
      }

      .stepper {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .stepper button {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 1px solid #e0e0e0;
        background: white;
        cursor: pointer;
        font-size: 14px;
      }

      .stepper span {
        min-width: 20px;
        text-align: center;
        font-weight: 600;
      }

      .search-box {
        flex: 1;
        min-width: 200px;
        max-width: 280px;
      }

      .search-box input {
        width: 100%;
        padding: 6px 12px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-size: 12px;
      }

      .legend-hint {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 11px;
        color: #666;
        margin-left: auto;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
      }

      .mock-timeline {
        height: 300px;
        background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
        position: relative;
      }

      .mock-timeline::before {
        content: "";
        position: absolute;
        top: 40px;
        left: 24px;
        right: 24px;
        height: 2px;
        background: #e0e0e0;
      }

      .mock-bar {
        position: absolute;
        height: 20px;
        border-radius: 4px;
        border: 2px solid;
      }

      .mock-bar:nth-child(1) {
        top: 60px;
        left: 100px;
        width: 120px;
        background: #dbeafe;
        border-color: #10b981;
      }
      .mock-bar:nth-child(2) {
        top: 90px;
        left: 100px;
        width: 80px;
        background: #dbeafe;
        border-color: #10b981;
      }
      .mock-bar:nth-child(3) {
        top: 120px;
        left: 150px;
        width: 200px;
        background: #dcfce7;
        border-color: #10b981;
      }
      .mock-bar:nth-child(4) {
        top: 150px;
        left: 250px;
        width: 150px;
        background: #dcfce7;
        border-color: #10b981;
      }
      .mock-bar:nth-child(5) {
        top: 180px;
        left: 350px;
        width: 300px;
        background: #dbeafe;
        border-color: #10b981;
      }

      .mock-label {
        position: absolute;
        left: 24px;
        font-size: 11px;
        color: #666;
      }

      .mock-label:nth-child(6) {
        top: 62px;
      }
      .mock-label:nth-child(7) {
        top: 92px;
      }
      .mock-label:nth-child(8) {
        top: 122px;
      }
      .mock-label:nth-child(9) {
        top: 152px;
      }
      .mock-label:nth-child(10) {
        top: 182px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Execution timeline</h2>
        <p>Relative start and duration for each executed node.</p>
      </div>

      <div class="filter-bar">
        <!-- Status -->
        <div class="filter-group">
          <span class="filter-label">Status</span>
          <button class="pill active">
            <span class="dot success"></span>
            Success 11
          </button>
        </div>

        <!-- Type -->
        <div class="filter-group">
          <span class="filter-label">Type</span>
          <button class="pill type-pill active">Model 11</button>
        </div>

        <!-- Depth -->
        <div class="filter-group">
          <span class="filter-label">Depth</span>
          <div class="stepper">
            <button>−</button>
            <span>2</span>
            <button>+</button>
          </div>
        </div>

        <!-- Direction -->
        <div class="filter-group">
          <span class="filter-label">Direction</span>
          <div class="segmented">
            <button>←</button>
            <button class="active">⇄ Both</button>
            <button>→</button>
          </div>
        </div>

        <!-- Search -->
        <div class="search-box">
          <input type="text" placeholder="Search nodes..." />
        </div>

        <!-- Legend hint -->
        <div class="legend-hint">
          <span>Fill = type</span>
          <span class="legend-swatch" style="background: #dbeafe"></span>
          <span>Border = status</span>
          <span
            class="legend-swatch"
            style="background: white; border: 2px solid #10b981"
          ></span>
        </div>
      </div>

      <div class="mock-timeline">
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-label">stg_customers</div>
        <div class="mock-label">stg_orders</div>
        <div class="mock-label">customers</div>
        <div class="mock-label">orders</div>
        <div class="mock-label">order_items</div>
      </div>
    </div>
  </body>
</html>
