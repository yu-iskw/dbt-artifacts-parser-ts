<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        padding: 40px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        display: flex;
      }

      /* Sidebar */
      .sidebar {
        width: 240px;
        background: #f8f9fa;
        border-right: 1px solid #e5e5e5;
        padding: 20px;
      }

      .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .sidebar-header h3 {
        font-size: 14px;
        font-weight: 600;
        color: #333;
      }

      .collapse-btn {
        width: 24px;
        height: 24px;
        border: none;
        background: #e5e5e5;
        border-radius: 4px;
        cursor: pointer;
      }

      .filter-section {
        margin-bottom: 24px;
      }

      .filter-section-title {
        font-size: 11px;
        font-weight: 600;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
      }

      .filter-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        color: #444;
        transition: background 0.15s;
      }

      .filter-item:hover {
        background: #e9ecef;
      }
      .filter-item.active {
        background: #dbeafe;
        color: #1e40af;
      }

      .filter-swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }

      .filter-count {
        margin-left: auto;
        font-size: 11px;
        color: #888;
        background: #e9ecef;
        padding: 2px 6px;
        border-radius: 10px;
      }

      .search-box {
        margin-bottom: 20px;
      }

      .search-box input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-size: 13px;
      }

      .depth-control {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .depth-control button {
        width: 28px;
        height: 28px;
        border: 1px solid #e0e0e0;
        background: white;
        border-radius: 4px;
        cursor: pointer;
      }

      .depth-value {
        min-width: 24px;
        text-align: center;
        font-weight: 600;
      }

      .direction-options {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .direction-option {
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .direction-option:hover {
        background: #e9ecef;
      }
      .direction-option.active {
        background: #dbeafe;
        color: #1e40af;
      }

      /* Main Content */
      .main {
        flex: 1;
      }

      .main-header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e5e5;
      }

      .main-header h2 {
        font-size: 16px;
        color: #333;
        font-weight: 600;
      }
      .main-header p {
        font-size: 13px;
        color: #666;
        margin-top: 4px;
      }

      .mock-timeline {
        height: 400px;
        background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
        position: relative;
        padding: 40px 24px;
      }

      .mock-bar {
        height: 20px;
        border-radius: 4px;
        border: 2px solid;
        margin-bottom: 12px;
      }

      .mock-bar:nth-child(1) {
        width: 120px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 100px;
      }
      .mock-bar:nth-child(2) {
        width: 80px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 100px;
      }
      .mock-bar:nth-child(3) {
        width: 200px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 150px;
      }
      .mock-bar:nth-child(4) {
        width: 150px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 250px;
      }
      .mock-bar:nth-child(5) {
        width: 300px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 350px;
      }

      .legend-bar {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 12px 24px;
        background: white;
        border-top: 1px solid #e5e5e5;
        font-size: 12px;
        color: #666;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="sidebar-header">
          <h3>Filters</h3>
          <button class="collapse-btn">‹</button>
        </div>

        <div class="search-box">
          <input type="text" placeholder="Search nodes..." />
        </div>

        <div class="filter-section">
          <div class="filter-section-title">Status</div>
          <div class="filter-item active">
            <span class="filter-swatch" style="background: #10b981"></span>
            <span>Success</span>
            <span class="filter-count">11</span>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-section-title">Type</div>
          <div class="filter-item active">
            <span
              class="filter-swatch"
              style="background: #3b82f6; width: 3px"
            ></span>
            <span>Model</span>
            <span class="filter-count">11</span>
          </div>
          <div class="filter-item">
            <span
              class="filter-swatch"
              style="background: #8b5cf6; width: 3px"
            ></span>
            <span>Test</span>
            <span class="filter-count">8</span>
          </div>
          <div class="filter-item">
            <span
              class="filter-swatch"
              style="background: #f59e0b; width: 3px"
            ></span>
            <span>Seed</span>
            <span class="filter-count">3</span>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-section-title">Dependency Depth</div>
          <div class="depth-control">
            <button>−</button>
            <span class="depth-value">2</span>
            <button>+</button>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-section-title">Direction</div>
          <div class="direction-options">
            <div class="direction-option">← Upstream</div>
            <div class="direction-option active">⇄ Both</div>
            <div class="direction-option">→ Downstream</div>
          </div>
        </div>

        <div class="filter-section">
          <div class="filter-item active">
            <span>✓ Show Tests</span>
          </div>
          <div class="filter-item">
            <span>✗ Failures Only</span>
          </div>
        </div>
      </div>

      <div class="main">
        <div class="main-header">
          <h2>Execution timeline</h2>
          <p>Relative start and duration for each executed node.</p>
        </div>

        <div class="mock-timeline">
          <div class="mock-bar"></div>
          <div class="mock-bar"></div>
          <div class="mock-bar"></div>
          <div class="mock-bar"></div>
          <div class="mock-bar"></div>
        </div>

        <div class="legend-bar">
          <div class="legend-item">
            <span class="legend-swatch" style="background: #dbeafe"></span>
            <span>Fill = resource type</span>
          </div>
          <div class="legend-item">
            <span
              class="legend-swatch"
              style="background: white; border: 2px solid #10b981"
            ></span>
            <span>Border = status</span>
          </div>
          <div class="legend-item">
            <span
              class="legend-swatch"
              style="background: rgba(0, 0, 0, 0.2)"
            ></span>
            <span>Compile phase</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
