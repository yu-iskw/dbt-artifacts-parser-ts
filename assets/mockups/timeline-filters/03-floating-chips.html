<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        padding: 40px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        position: relative;
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e5e5;
      }
      .header h2 {
        font-size: 16px;
        color: #333;
        font-weight: 600;
      }
      .header p {
        font-size: 13px;
        color: #666;
        margin-top: 4px;
      }

      /* Floating Filter Bar */
      .floating-bar {
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: white;
        border-radius: 24px;
        box-shadow:
          0 4px 20px rgba(0, 0, 0, 0.15),
          0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .filter-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: #f3f4f6;
        border-radius: 16px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid transparent;
      }

      .filter-chip:hover {
        background: #e5e7eb;
        transform: translateY(-1px);
      }

      .filter-chip.active {
        background: #dbeafe;
        border-color: #3b82f6;
        color: #1e40af;
      }

      .filter-chip .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }

      .filter-chip .dot.success {
        background: #10b981;
      }
      .filter-chip .dot.model {
        background: #3b82f6;
      }

      .filter-chip .count {
        background: rgba(0, 0, 0, 0.1);
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
      }

      .divider {
        width: 1px;
        height: 20px;
        background: #e5e5e5;
        margin: 0 4px;
      }

      .direction-chip {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .search-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: white;
        border: 1px solid #e5e5e5;
        border-radius: 16px;
        font-size: 12px;
      }

      .search-chip input {
        border: none;
        outline: none;
        font-size: 12px;
        width: 120px;
      }

      .more-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #e5e5e5;
        background: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Timeline Area */
      .timeline-area {
        height: 400px;
        background: linear-gradient(180deg, #fafafa 0%, #f5f5f5 100%);
        position: relative;
        padding-top: 60px;
      }

      .mock-bar {
        height: 20px;
        border-radius: 4px;
        border: 2px solid;
        margin-bottom: 12px;
        margin-left: 100px;
      }

      .mock-bar:nth-child(1) {
        width: 120px;
        background: #dbeafe;
        border-color: #10b981;
      }
      .mock-bar:nth-child(2) {
        width: 80px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 100px;
      }
      .mock-bar:nth-child(3) {
        width: 200px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 150px;
      }
      .mock-bar:nth-child(4) {
        width: 150px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 250px;
      }
      .mock-bar:nth-child(5) {
        width: 300px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 350px;
      }

      /* Mini Legend */
      .mini-legend {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        font-size: 11px;
        color: #666;
      }

      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }

      /* Depth Control Popover (shown on hover concept) */
      .popover {
        position: absolute;
        top: 130px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        padding: 16px;
        display: none;
      }

      .popover.show {
        display: block;
      }

      .popover-title {
        font-size: 12px;
        font-weight: 600;
        color: #333;
        margin-bottom: 12px;
      }

      .depth-slider {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .depth-slider input {
        width: 150px;
      }

      .depth-slider span {
        font-size: 14px;
        font-weight: 600;
        min-width: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Execution timeline</h2>
        <p>Relative start and duration for each executed node.</p>
      </div>

      <div class="floating-bar">
        <div class="filter-chip active">
          <span class="dot success"></span>
          <span>Success</span>
          <span class="count">11</span>
        </div>

        <div class="filter-chip active">
          <span class="dot model"></span>
          <span>Model</span>
          <span class="count">11</span>
        </div>

        <div class="divider"></div>

        <div class="filter-chip direction-chip active">
          <span>⇄</span>
          <span>Both</span>
        </div>

        <div class="filter-chip">
          <span>Depth: 2</span>
        </div>

        <div class="divider"></div>

        <div class="search-chip">
          <span>🔍</span>
          <input type="text" placeholder="Search..." />
        </div>

        <button class="more-btn">⋯</button>
      </div>

      <div class="popover show">
        <div class="popover-title">Dependency Depth</div>
        <div class="depth-slider">
          <span>1</span>
          <input type="range" min="1" max="10" value="2" />
          <span>2</span>
        </div>
      </div>

      <div class="timeline-area">
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>

        <div class="mini-legend">
          <span>Fill=type</span>
          <span class="legend-dot" style="background: #dbeafe"></span>
          <span>Border=status</span>
          <span
            class="legend-dot"
            style="background: white; border: 2px solid #10b981"
          ></span>
        </div>
      </div>
    </div>
  </body>
</html>
