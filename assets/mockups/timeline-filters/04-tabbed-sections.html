<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        padding: 40px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e5e5;
      }
      .header h2 {
        font-size: 16px;
        color: #333;
        font-weight: 600;
      }
      .header p {
        font-size: 13px;
        color: #666;
        margin-top: 4px;
      }

      /* Filter Tabs */
      .filter-container {
        background: #fafafa;
        border-bottom: 1px solid #e5e5e5;
      }

      .filter-tabs {
        display: flex;
        border-bottom: 1px solid #e5e5e5;
        padding: 0 24px;
      }

      .filter-tab {
        padding: 12px 20px;
        font-size: 13px;
        color: #666;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .filter-tab:hover {
        color: #333;
      }
      .filter-tab.active {
        color: #3b82f6;
        border-bottom-color: #3b82f6;
        font-weight: 500;
      }

      .filter-tab .badge {
        background: #e5e5e5;
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 10px;
      }

      .filter-content {
        padding: 16px 24px;
      }

      .filter-panel {
        display: none;
      }

      .filter-panel.active {
        display: block;
      }

      .pills-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .filter-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-pill:hover {
        border-color: #c0c0c0;
      }
      .filter-pill.active {
        background: #dbeafe;
        border-color: #3b82f6;
        color: #1e40af;
      }

      .swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }

      .type-swatch {
        border-left: 3px solid;
        border-radius: 0;
        width: 13px;
      }

      .count-badge {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 11px;
        margin-left: 4px;
      }

      .direction-controls {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .direction-group {
        display: flex;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #e0e0e0;
      }

      .direction-btn {
        padding: 8px 16px;
        border: none;
        background: white;
        font-size: 13px;
        cursor: pointer;
        border-right: 1px solid #e0e0e0;
      }

      .direction-btn:last-child {
        border-right: none;
      }
      .direction-btn.active {
        background: #3b82f6;
        color: white;
      }

      .depth-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .depth-group label {
        font-size: 13px;
        color: #666;
      }

      .stepper {
        display: flex;
        align-items: center;
        gap: 4px;
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 2px;
      }

      .stepper button {
        width: 24px;
        height: 24px;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: 4px;
      }

      .stepper button:hover {
        background: #f3f4f6;
      }

      .stepper span {
        min-width: 24px;
        text-align: center;
        font-weight: 600;
      }

      /* Search Bar */
      .search-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 24px;
        border-bottom: 1px solid #e5e5e5;
      }

      .search-input-wrapper {
        flex: 1;
        position: relative;
      }

      .search-input-wrapper input {
        width: 100%;
        padding: 8px 12px 8px 36px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 13px;
      }

      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #999;
      }

      .clear-btn {
        padding: 6px 12px;
        border: 1px solid #e0e0e0;
        background: white;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
      }

      .legend-hint {
        font-size: 12px;
        color: #666;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Timeline */
      .timeline {
        height: 300px;
        background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
        position: relative;
      }

      .mock-bar {
        height: 20px;
        border-radius: 4px;
        border: 2px solid;
        margin-bottom: 12px;
        margin-left: 100px;
      }

      .mock-bar:nth-child(1) {
        width: 120px;
        background: #dbeafe;
        border-color: #10b981;
        margin-top: 40px;
      }
      .mock-bar:nth-child(2) {
        width: 80px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 100px;
      }
      .mock-bar:nth-child(3) {
        width: 200px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 150px;
      }
      .mock-bar:nth-child(4) {
        width: 150px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 250px;
      }
      .mock-bar:nth-child(5) {
        width: 300px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 350px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Execution timeline</h2>
        <p>Relative start and duration for each executed node.</p>
      </div>

      <div class="filter-container">
        <div class="filter-tabs">
          <div class="filter-tab active">
            Status
            <span class="badge">1</span>
          </div>
          <div class="filter-tab">
            Type
            <span class="badge">1</span>
          </div>
          <div class="filter-tab">Dependencies</div>
          <div class="filter-tab">View Options</div>
        </div>

        <div class="filter-content">
          <!-- Status Panel (Active) -->
          <div class="filter-panel active">
            <div class="pills-container">
              <div class="filter-pill active">
                <span class="swatch" style="background: #10b981"></span>
                <span>Success</span>
                <span class="count-badge">11</span>
              </div>
              <div class="filter-pill">
                <span class="swatch" style="background: #f59e0b"></span>
                <span>Warning</span>
                <span class="count-badge">2</span>
              </div>
              <div class="filter-pill">
                <span class="swatch" style="background: #ef4444"></span>
                <span>Error</span>
                <span class="count-badge">1</span>
              </div>
            </div>
          </div>

          <!-- Type Panel (Hidden) -->
          <div class="filter-panel">
            <div class="pills-container">
              <div class="filter-pill active">
                <span class="type-swatch" style="border-color: #3b82f6"></span>
                <span>Model</span>
                <span class="count-badge">11</span>
              </div>
              <div class="filter-pill">
                <span class="type-swatch" style="border-color: #8b5cf6"></span>
                <span>Test</span>
                <span class="count-badge">8</span>
              </div>
            </div>
          </div>

          <!-- Dependencies Panel (Hidden) -->
          <div class="filter-panel">
            <div class="direction-controls">
              <div class="direction-group">
                <button class="direction-btn">← Upstream</button>
                <button class="direction-btn active">⇄ Both</button>
                <button class="direction-btn">→ Downstream</button>
              </div>
              <div class="depth-group">
                <label>Depth:</label>
                <div class="stepper">
                  <button>−</button>
                  <span>2</span>
                  <button>+</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="search-bar">
        <div class="search-input-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search nodes by name or ID..." />
        </div>
        <button class="clear-btn">Clear all</button>
        <div class="legend-hint">
          <span>Fill = type</span>
          <span>│</span>
          <span>Border = status</span>
        </div>
      </div>

      <div class="timeline">
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
      </div>
    </div>
  </body>
</html>
