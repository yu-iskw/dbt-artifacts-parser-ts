<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        padding: 40px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e5e5;
      }
      .header h2 {
        font-size: 16px;
        color: #333;
        font-weight: 600;
      }
      .header p {
        font-size: 13px;
        color: #666;
        margin-top: 4px;
      }

      /* Search Bar */
      .search-section {
        padding: 16px 24px;
        background: #fafafa;
        border-bottom: 1px solid #e5e5e5;
      }

      .search-row {
        display: flex;
        gap: 12px;
      }

      .search-input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
      }

      .expand-btn {
        padding: 10px 16px;
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* Accordion */
      .accordion {
        border-bottom: 1px solid #e5e5e5;
      }

      .accordion-item {
        border-bottom: 1px solid #e5e5e5;
      }

      .accordion-item:last-child {
        border-bottom: none;
      }

      .accordion-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 24px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .accordion-header:hover {
        background: #f9f9f9;
      }

      .accordion-icon {
        width: 20px;
        text-align: center;
        transition: transform 0.2s;
      }

      .accordion-item.expanded .accordion-icon {
        transform: rotate(90deg);
      }

      .accordion-title {
        font-size: 13px;
        font-weight: 500;
        color: #333;
        flex: 1;
      }

      .accordion-summary {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #666;
      }

      .summary-pill {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        background: #dbeafe;
        border-radius: 10px;
        font-size: 11px;
        color: #1e40af;
      }

      .accordion-content {
        display: none;
        padding: 0 24px 16px 56px;
      }

      .accordion-item.expanded .accordion-content {
        display: block;
      }

      .filter-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .filter-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }

      .filter-btn:hover {
        border-color: #c0c0c0;
      }
      .filter-btn.active {
        background: #dbeafe;
        border-color: #3b82f6;
        color: #1e40af;
      }

      .swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }

      .type-swatch {
        border-left: 3px solid;
        border-radius: 0;
        width: 13px;
      }

      .controls-row {
        display: flex;
        align-items: center;
        gap: 24px;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .control-label {
        font-size: 13px;
        color: #666;
      }

      .segmented {
        display: flex;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid #e0e0e0;
      }

      .segmented button {
        padding: 6px 12px;
        border: none;
        background: white;
        font-size: 12px;
        cursor: pointer;
        border-right: 1px solid #e0e0e0;
      }

      .segmented button:last-child {
        border-right: none;
      }
      .segmented button.active {
        background: #3b82f6;
        color: white;
      }

      .stepper {
        display: flex;
        align-items: center;
        gap: 4px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 2px;
      }

      .stepper button {
        width: 24px;
        height: 24px;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: 4px;
      }

      .stepper button:hover {
        background: #f3f4f6;
      }
      .stepper span {
        min-width: 24px;
        text-align: center;
        font-weight: 600;
      }

      /* Timeline */
      .timeline {
        height: 280px;
        background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
      }

      .mock-bar {
        height: 20px;
        border-radius: 4px;
        border: 2px solid;
        margin-bottom: 12px;
        margin-left: 100px;
      }

      .mock-bar:nth-child(1) {
        width: 120px;
        background: #dbeafe;
        border-color: #10b981;
        margin-top: 30px;
      }
      .mock-bar:nth-child(2) {
        width: 80px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 100px;
      }
      .mock-bar:nth-child(3) {
        width: 200px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 150px;
      }
      .mock-bar:nth-child(4) {
        width: 150px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 250px;
      }
      .mock-bar:nth-child(5) {
        width: 300px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 350px;
      }

      /* Legend Footer */
      .legend-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        border-top: 1px solid #e5e5e5;
        font-size: 12px;
        color: #666;
      }

      .legend-items {
        display: flex;
        gap: 20px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
      }

      .clear-btn {
        padding: 4px 10px;
        border: 1px solid #e0e0e0;
        background: white;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Execution timeline</h2>
        <p>Relative start and duration for each executed node.</p>
      </div>

      <div class="search-section">
        <div class="search-row">
          <input
            type="text"
            class="search-input"
            placeholder="Search nodes by name or ID..."
          />
          <button class="expand-btn">
            <span>Filters</span>
            <span>▼</span>
          </button>
        </div>
      </div>

      <div class="accordion">
        <div class="accordion-item expanded">
          <div class="accordion-header">
            <span class="accordion-icon">▶</span>
            <span class="accordion-title">Status Filter</span>
            <div class="accordion-summary">
              <span class="summary-pill">Success 11</span>
            </div>
          </div>
          <div class="accordion-content">
            <div class="filter-grid">
              <button class="filter-btn active">
                <span class="swatch" style="background: #10b981"></span>
                <span>Success</span>
                <span>(11)</span>
              </button>
              <button class="filter-btn">
                <span class="swatch" style="background: #f59e0b"></span>
                <span>Warning</span>
                <span>(2)</span>
              </button>
              <button class="filter-btn">
                <span class="swatch" style="background: #ef4444"></span>
                <span>Error</span>
                <span>(0)</span>
              </button>
            </div>
          </div>
        </div>

        <div class="accordion-item expanded">
          <div class="accordion-header">
            <span class="accordion-icon">▶</span>
            <span class="accordion-title">Type Filter</span>
            <div class="accordion-summary">
              <span class="summary-pill">Model 11</span>
            </div>
          </div>
          <div class="accordion-content">
            <div class="filter-grid">
              <button class="filter-btn active">
                <span class="type-swatch" style="border-color: #3b82f6"></span>
                <span>Model</span>
                <span>(11)</span>
              </button>
              <button class="filter-btn">
                <span class="type-swatch" style="border-color: #8b5cf6"></span>
                <span>Test</span>
                <span>(8)</span>
              </button>
              <button class="filter-btn">
                <span class="type-swatch" style="border-color: #f59e0b"></span>
                <span>Seed</span>
                <span>(3)</span>
              </button>
            </div>
          </div>
        </div>

        <div class="accordion-item">
          <div class="accordion-header">
            <span class="accordion-icon">▶</span>
            <span class="accordion-title">Dependencies</span>
            <div class="accordion-summary">
              <span class="summary-pill">Both · Depth 2</span>
            </div>
          </div>
          <div class="accordion-content">
            <div class="controls-row">
              <div class="control-group">
                <span class="control-label">Direction:</span>
                <div class="segmented">
                  <button>← Up</button>
                  <button class="active">⇄ Both</button>
                  <button>→ Down</button>
                </div>
              </div>
              <div class="control-group">
                <span class="control-label">Depth:</span>
                <div class="stepper">
                  <button>−</button>
                  <span>2</span>
                  <button>+</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="accordion-item">
          <div class="accordion-header">
            <span class="accordion-icon">▶</span>
            <span class="accordion-title">View Options</span>
          </div>
          <div class="accordion-content">
            <div class="filter-grid">
              <button class="filter-btn active">Show Tests</button>
              <button class="filter-btn">Failures Only</button>
            </div>
          </div>
        </div>
      </div>

      <div class="timeline">
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
      </div>

      <div class="legend-footer">
        <div class="legend-items">
          <div class="legend-item">
            <span class="legend-swatch" style="background: #dbeafe"></span>
            <span>Fill = type</span>
          </div>
          <div class="legend-item">
            <span
              class="legend-swatch"
              style="background: white; border: 2px solid #10b981"
            ></span>
            <span>Border = status</span>
          </div>
        </div>
        <button class="clear-btn">Clear all filters</button>
      </div>
    </div>
  </body>
</html>
