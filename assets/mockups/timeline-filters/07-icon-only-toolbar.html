<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        padding: 40px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e5e5;
      }
      .header h2 {
        font-size: 16px;
        color: #333;
        font-weight: 600;
      }
      .header p {
        font-size: 13px;
        color: #666;
        margin-top: 4px;
      }

      /* Icon Toolbar */
      .icon-toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 8px 16px;
        background: #fafafa;
        border-bottom: 1px solid #e5e5e5;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        background: transparent;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.15s;
        position: relative;
      }

      .icon-btn:hover {
        background: #e5e5e5;
      }

      .icon-btn.active {
        background: #dbeafe;
        border-color: #3b82f6;
      }

      .icon-btn .badge {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 14px;
        height: 14px;
        background: #3b82f6;
        color: white;
        font-size: 9px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toolbar-divider {
        width: 1px;
        height: 24px;
        background: #e0e0e0;
        margin: 0 4px;
      }

      .search-icon-btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #e0e0e0;
        background: white;
        border-radius: 8px;
        cursor: pointer;
      }

      /* Expanded Panel (shown when icon clicked) */
      .filter-panel {
        padding: 16px 24px;
        background: white;
        border-bottom: 1px solid #e5e5e5;
        display: flex;
        gap: 40px;
      }

      .panel-section {
        flex: 1;
      }

      .panel-title {
        font-size: 11px;
        font-weight: 600;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }

      .filter-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .mini-pill {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        background: #f3f4f6;
        border-radius: 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .mini-pill.active {
        background: #dbeafe;
        color: #1e40af;
      }

      .mini-swatch {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .controls-inline {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .inline-stepper {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .inline-stepper button {
        width: 24px;
        height: 24px;
        border: 1px solid #e0e0e0;
        background: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }

      .inline-stepper span {
        min-width: 20px;
        text-align: center;
        font-weight: 600;
        font-size: 13px;
      }

      .direction-mini {
        display: flex;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid #e0e0e0;
      }

      .direction-mini button {
        width: 32px;
        height: 28px;
        border: none;
        background: white;
        font-size: 12px;
        cursor: pointer;
        border-right: 1px solid #e0e0e0;
      }

      .direction-mini button:last-child {
        border-right: none;
      }
      .direction-mini button.active {
        background: #3b82f6;
        color: white;
      }

      /* Search Expand */
      .search-expand {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .search-expand input {
        flex: 1;
        max-width: 300px;
        padding: 8px 12px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-size: 13px;
      }

      /* Timeline */
      .timeline-area {
        height: 350px;
        background: linear-gradient(180deg, #fafafa 0%, #f5f5f5 100%);
        position: relative;
      }

      .mock-bar {
        height: 20px;
        border-radius: 4px;
        border: 2px solid;
        margin-bottom: 12px;
        margin-left: 100px;
      }

      .mock-bar:nth-child(1) {
        width: 120px;
        background: #dbeafe;
        border-color: #10b981;
        margin-top: 40px;
      }
      .mock-bar:nth-child(2) {
        width: 80px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 100px;
      }
      .mock-bar:nth-child(3) {
        width: 200px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 150px;
      }
      .mock-bar:nth-child(4) {
        width: 150px;
        background: #dcfce7;
        border-color: #10b981;
        margin-left: 250px;
      }
      .mock-bar:nth-child(5) {
        width: 300px;
        background: #dbeafe;
        border-color: #10b981;
        margin-left: 350px;
      }

      /* Tooltip mock */
      .tooltip {
        position: absolute;
        top: 50px;
        left: 60px;
        background: #1f2937;
        color: white;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;
        opacity: 0.9;
      }

      .tooltip::after {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 50%;
        transform: translateX(-50%);
        border-left: 4px solid transparent;
        border-right: 4px solid transparent;
        border-top: 4px solid #1f2937;
      }

      /* Floating Legend */
      .floating-legend {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        gap: 16px;
        padding: 10px 14px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        font-size: 11px;
        color: #666;
      }

      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        display: inline-block;
        margin-right: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Execution timeline</h2>
        <p>Relative start and duration for each executed node.</p>
      </div>

      <div class="icon-toolbar">
        <!-- Status Icon -->
        <button class="icon-btn active" title="Status filter">
          <span>🟢</span>
          <span class="badge">1</span>
        </button>

        <!-- Type Icon -->
        <button class="icon-btn active" title="Type filter">
          <span>📦</span>
          <span class="badge">1</span>
        </button>

        <div class="toolbar-divider"></div>

        <!-- Dependency Icons -->
        <button class="icon-btn" title="Direction">
          <span>⇄</span>
        </button>
        <button class="icon-btn" title="Depth: 2">
          <span>2️⃣</span>
        </button>

        <div class="toolbar-divider"></div>

        <!-- View Icons -->
        <button class="icon-btn active" title="Show tests">
          <span>🧪</span>
        </button>
        <button class="icon-btn" title="Failures only">
          <span>⚠️</span>
        </button>

        <div class="toolbar-divider"></div>

        <!-- Search -->
        <button class="search-icon-btn">
          <span>🔍</span>
        </button>

        <div class="search-expand">
          <input type="text" placeholder="Search nodes..." />
        </div>
      </div>

      <div class="filter-panel">
        <div class="panel-section">
          <div class="panel-title">Status</div>
          <div class="filter-pills">
            <span class="mini-pill active">
              <span class="mini-swatch" style="background: #10b981"></span>
              Success (11)
            </span>
            <span class="mini-pill">
              <span class="mini-swatch" style="background: #f59e0b"></span>
              Warning (2)
            </span>
            <span class="mini-pill">
              <span class="mini-swatch" style="background: #ef4444"></span>
              Error (0)
            </span>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-title">Type</div>
          <div class="filter-pills">
            <span class="mini-pill active">📦 Model (11)</span>
            <span class="mini-pill">🧪 Test (8)</span>
            <span class="mini-pill">🌱 Seed (3)</span>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-title">Dependencies</div>
          <div class="controls-inline">
            <div class="direction-mini">
              <button>←</button>
              <button class="active">⇄</button>
              <button>→</button>
            </div>
            <div class="inline-stepper">
              <button>−</button>
              <span>2</span>
              <button>+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="timeline-area">
        <div class="tooltip">Filter by status</div>

        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>
        <div class="mock-bar"></div>

        <div class="floating-legend">
          <span
            ><span class="legend-dot" style="background: #dbeafe"></span
            >Fill=type</span
          >
          <span
            ><span
              class="legend-dot"
              style="
                background: white;
                border: 2px solid #10b981;
                box-sizing: border-box;
              "
            ></span
            >Border=status</span
          >
        </div>
      </div>
    </div>
  </body>
</html>
